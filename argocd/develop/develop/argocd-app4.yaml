apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: httpd-dev-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BasChimmy/argocd-poc
    targetRevision: mulitenv
    path: app4
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: httpd-dev-app
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
